{% extends "base.html" %}
{% block content %}

<style>
    :root {
        --reflex-waiting: #2563eb;
        --reflex-ready: #10b981;
        --reflex-error: #ef4444;
    }

    .reflex-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        text-align: center;
        animation: fadeIn 0.8s ease-out;
    }

    /* --- DASHBOARD --- */
    .reflex-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-pill {
        background: var(--sidebar-bg);
        padding: 15px;
        border-radius: 20px;
        border: 1px solid var(--primary-glow);
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }

    .stat-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); display: block; }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

    /* --- THE INTERACTIVE STAGE --- */
    #reflex-stage {
        width: 100%;
        height: 400px;
        background: var(--reflex-waiting);
        border-radius: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        user-select: none;
        transition: background 0.1s ease, transform 0.1s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(37, 99, 235, 0.2);
    }

    #reflex-stage:active { transform: scale(0.98); }

    .stage-icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.9; }
    .stage-text { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    .stage-subtext { font-size: 1rem; opacity: 0.7; font-weight: 500; }

    /* --- BACK BUTTON --- */
    .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        text-decoration: none !important;
        font-weight: 700;
        margin-bottom: 25px;
        transition: 0.3s;
    }
    .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

    /* --- RESULTS LIST --- */
    .history-list {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
    }
    .history-tag {
        background: var(--primary-glow);
        color: var(--primary);
        padding: 5px 15px;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: 700;
    }
</style>

<div class="reflex-container">
    <div class="text-start">
        <a href="{% url 'games' %}" class="btn-back">
            <i class="fas fa-chevron-left"></i> Return to Lab
        </a>
    </div>

    <div class="mb-4">
        <h2 class="fw-black mb-1">Neural Reflex Diagnostic</h2>
        <p class="text-muted small">Measure your brain's processing latency.</p>
    </div>

    <div class="reflex-stats">
        <div class="stat-pill">
            <span class="stat-label">Last Reaction</span>
            <span id="last-reflex" class="stat-value">-- ms</span>
        </div>
        <div class="stat-pill">
            <span class="stat-label">Best Reflex</span>
            <span id="best-reflex" class="stat-value text-success">-- ms</span>
        </div>
    </div>

    <div id="reflex-stage" onclick="handleStageClick()">
        <div class="stage-icon" id="icon-display"><i class="fas fa-bolt"></i></div>
        <div class="stage-text" id="text-display">Click to Start</div>
        <div class="stage-subtext" id="subtext-display">Tests your synapses</div>
    </div>

    <div class="history-list" id="history-box"></div>
</div>

<script>
    /**
     * Reflex Diagnostic Logic
     */
    let state = 'IDLE'; // IDLE, WAITING, READY, ERROR
    let startTime, timeoutId;
    let history = [];
    let bestScore = Infinity;

    const stage = document.getElementById('reflex-stage');
    const icon = document.getElementById('icon-display');
    const text = document.getElementById('text-display');
    const subtext = document.getElementById('subtext-display');

    function handleStageClick() {
        switch(state) {
            case 'IDLE':
                startWaiting();
                break;
            case 'WAITING':
                triggerError();
                break;
            case 'READY':
                calculateReflex();
                break;
            case 'ERROR':
                startWaiting();
                break;
        }
    }

    function startWaiting() {
        state = 'WAITING';
        stage.style.background = 'var(--reflex-waiting)';
        stage.style.boxShadow = '0 20px 50px rgba(37, 99, 235, 0.2)';
        icon.innerHTML = '<i class="fas fa-hourglass-half animate__animated animate__rotateIn animate__infinite"></i>';
        text.innerText = 'Wait for Green...';
        subtext.innerText = 'React immediately';

        // Set random delay between 2 and 5 seconds
        const delay = Math.random() * 3000 + 2000;
        timeoutId = setTimeout(triggerReady, delay);
    }

    function triggerReady() {
        state = 'READY';
        stage.style.background = 'var(--reflex-ready)';
        stage.style.boxShadow = '0 20px 50px rgba(16, 185, 129, 0.3)';
        icon.innerHTML = '<i class="fas fa-hand-pointer"></i>';
        text.innerText = 'CLICK NOW!';
        subtext.innerText = 'Go! Go! Go!';
        startTime = performance.now();
    }

    function triggerError() {
        state = 'ERROR';
        clearTimeout(timeoutId);
        stage.style.background = 'var(--reflex-error)';
        stage.style.boxShadow = '0 20px 50px rgba(239, 68, 68, 0.3)';
        icon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        text.innerText = 'Too Early!';
        subtext.innerText = 'Click to try again';
    }

    function calculateReflex() {
        state = 'IDLE';
        const endTime = performance.now();
        const reactionTime = Math.round(endTime - startTime);
        
        // Update Stats
        document.getElementById('last-reflex').innerText = reactionTime + ' ms';
        if(reactionTime < bestScore) {
            bestScore = reactionTime;
            document.getElementById('best-reflex').innerText = bestScore + ' ms';
        }

        // Add to History
        addHistory(reactionTime);

        // Update Stage
        stage.style.background = 'var(--sidebar-bg)';
        stage.style.boxShadow = '0 10px 25px rgba(0,0,0,0.05)';
        stage.style.color = 'var(--text-dark)';
        icon.innerHTML = '<i class="fas fa-tachometer-alt" style="color: var(--primary)"></i>';
        text.innerText = reactionTime + ' ms';
        subtext.innerText = getComment(reactionTime);
    }

    function getComment(time) {
        if (time < 200) return "Superhuman Reflexes! 🚀";
        if (time < 250) return "Excellent Focus. 💎";
        if (time < 350) return "Decent Reaction. ⚙️";
        return "A bit slow, keep practicing. 🧠";
    }

    function addHistory(time) {
        const box = document.getElementById('history-box');
        const tag = document.createElement('div');
        tag.className = 'history-tag animate__animated animate__bounceIn';
        tag.innerText = time + 'ms';
        box.prepend(tag);
        
        // Keep only last 5
        if(box.children.length > 5) box.removeChild(box.lastChild);
    }
</script>

{% endblock %}
