{% extends "base.html" %}
{% block content %}

<style>
    :root {
        --snake-primary: #6366f1;
        --snake-bg: #0f172a;
        --food-color: #f43f5e;
        --grid-line: rgba(255, 255, 255, 0.05);
    }

    .game-container {
        max-width: 600px;
        margin: 30px auto;
        padding: 20px;
        text-align: center;
        animation: fadeIn 0.8s ease-out;
    }

    /* --- DASHBOARD --- */
    .game-dashboard {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 15px;
        margin-bottom: 25px;
    }

    .stat-card {
        background: var(--sidebar-bg);
        padding: 15px;
        border-radius: 20px;
        border: 1px solid var(--primary-glow);
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .stat-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 5px; }
    .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--primary); }

    /* --- THE CANVAS STAGE --- */
    .canvas-wrapper {
        position: relative;
        display: inline-block;
        border-radius: 24px;
        padding: 10px;
        background: var(--sidebar-bg);
        border: 1px solid var(--primary-glow);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
    }

    canvas {
        display: block;
        background-color: var(--snake-bg);
        border-radius: 16px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    /* --- OVERLAYS --- */
    #game-overlay {
        position: absolute;
        inset: 10px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        color: white;
        display: none;
    }

    /* --- NAVIGATION --- */
    .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        text-decoration: none !important;
        font-weight: 700;
        margin-bottom: 20px;
        transition: 0.3s;
    }
    .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

    .btn-action {
        padding: 12px 30px;
        border-radius: 12px;
        font-weight: 800;
        border: none;
        transition: 0.3s;
    }
    .btn-restart { background: var(--primary); color: white; }
    .btn-restart:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary-glow); }

</style>

<div class="game-container">
    <div class="text-start">
        <a href="{% url 'games' %}" class="btn-back">
            <i class="fas fa-chevron-left"></i> Return to Lab
        </a>
    </div>

    <div class="mb-4">
        <h2 class="fw-black mb-1">Data Stream Navigator</h2>
        <p class="text-muted small">Optimizing growth vectors without collision.</p>
    </div>

    <div class="game-dashboard">
        <div class="stat-card">
            <span class="stat-label">Current Nodes</span>
            <span id="score-val" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Record</span>
            <span id="high-score" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">System</span>
            <span class="stat-value" style="color: var(--success); font-size: 0.9rem;">STABLE</span>
        </div>
    </div>

    <div class="canvas-wrapper">
        <div id="game-overlay">
            <i class="fas fa-microchip fa-3x mb-3" style="color: var(--danger)"></i>
            <h2 class="fw-black mb-1">SYSTEM FAILURE</h2>
            <p class="opacity-75">Data stream collapsed.</p>
            <button class="btn-action btn-restart mt-3" onclick="resetGame()">Initialize Reboot</button>
        </div>
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>

    <div class="mt-4">
        <p class="text-muted small"><i class="fas fa-directions me-2"></i> Use <b>Arrow Keys</b> to navigate the stream.</p>
    </div>
</div>

<script>
    /**
     * Professional Snake Logic Engine
     */
    const canvas = document.getElementById("snakeGame");
    const ctx = canvas.getContext("2d");
    const grid = 20;
    const count = canvas.width / grid;

    let score = 0;
    let highScore = localStorage.getItem("snakeHighScore") || 0;
    document.getElementById("high-score").innerText = highScore;

    let snake = [{x: 10, y: 10}, {x: 10, y: 11}];
    let food = {x: 15, y: 15};
    let dx = 0;
    let dy = -1; // Start moving up
    let gameActive = true;
    let gameSpeed = 100;

    // Control buffering to prevent 180-degree self-collision
    let nextDx = dx;
    let nextDy = dy;

    document.onkeydown = e => {
        if (e.key === "ArrowUp" && dy === 0) { nextDx = 0; nextDy = -1; }
        else if (e.key === "ArrowDown" && dy === 0) { nextDx = 0; nextDy = 1; }
        else if (e.key === "ArrowLeft" && dx === 0) { nextDx = -1; nextDy = 0; }
        else if (e.key === "ArrowRight" && dx === 0) { nextDx = 1; nextDy = 0; }
    };

    function drawGrid() {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        for(let i=0; i<canvas.width; i+=grid) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }
    }

    function main() {
        if (!gameActive) return;

        setTimeout(function onTick() {
            dx = nextDx;
            dy = nextDy;
            
            update();
            draw();
            main();
        }, gameSpeed);
    }

    function update() {
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // Wall Collision
        if (head.x < 0 || head.x >= count || head.y < 0 || head.y >= count) {
            return gameOver();
        }

        // Self Collision
        for (let i = 0; i < snake.length; i++) {
            if (head.x === snake[i].x && head.y === snake[i].y) return gameOver();
        }

        snake.unshift(head);

        // Food Logic
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            document.getElementById("score-val").innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                document.getElementById("high-score").innerText = highScore;
            }
            generateFood();
            // Speed up slightly
            gameSpeed = Math.max(50, 100 - Math.floor(score/50) * 5);
        } else {
            snake.pop();
        }
    }

    function draw() {
        // Clear background
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawGrid();

        // Draw Snake
        snake.forEach((s, index) => {
            // Gradient effect for snake body
            ctx.fillStyle = (index === 0) ? "#818cf8" : "#6366f1";
            ctx.shadowBlur = (index === 0) ? 15 : 0;
            ctx.shadowColor = "#6366f1";
            
            // Draw rounded segments
            ctx.beginPath();
            ctx.roundRect(s.x * grid + 2, s.y * grid + 2, grid - 4, grid - 4, 5);
            ctx.fill();
        });
        
        ctx.shadowBlur = 0;

        // Draw Food (Data Node)
        ctx.fillStyle = "#f43f5e";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#f43f5e";
        ctx.beginPath();
        ctx.arc(food.x * grid + grid/2, food.y * grid + grid/2, grid/3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    function generateFood() {
        food = {
            x: Math.floor(Math.random() * count),
            y: Math.floor(Math.random() * count)
        };
        // Don't spawn food on snake body
        snake.forEach(s => {
            if (s.x === food.x && s.y === food.y) generateFood();
        });
    }

    function gameOver() {
        gameActive = false;
        document.getElementById("game-overlay").style.display = "flex";
    }

    function resetGame() {
        snake = [{x: 10, y: 10}, {x: 10, y: 11}];
        generateFood();
        dx = 0;
        dy = -1;
        nextDx = 0;
        nextDy = -1;
        score = 0;
        gameSpeed = 100;
        document.getElementById("score-val").innerText = "0";
        document.getElementById("game-overlay").style.display = "none";
        gameActive = true;
        main();
    }

    // Start Engine
    main();

</script>

{% endblock %}
